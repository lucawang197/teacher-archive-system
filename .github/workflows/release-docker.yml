name: release-docker-images

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_BACKEND: ${{ secrets.ACR_REGISTRY }}/teacher-archive/teacher-archive-system-backend
  ACR_FRONTEND: ${{ secrets.ACR_REGISTRY }}/teacher-archive/teacher-archive-system-frontend

jobs:
  publish:
    name: Publish Docker Images To ACR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "value=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_BACKEND }}:${{ steps.tag.outputs.value }}
            ${{ env.ACR_BACKEND }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ACR_FRONTEND }}:${{ steps.tag.outputs.value }}
            ${{ env.ACR_FRONTEND }}:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "value=${TAG}" >> $GITHUB_OUTPUT

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/nginx/"
          target: "/opt/teacher-archive-system"
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/teacher-archive-system
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
            export IMAGE_TAG=${{ steps.tag.outputs.value }}
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
