name: release-docker-images

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "value=${TAG}" >> $GITHUB_OUTPUT

      - name: Build images
        run: |
          docker build -t teacher-archive-backend:${{ steps.tag.outputs.value }} ./backend
          docker build -t teacher-archive-frontend:${{ steps.tag.outputs.value }} ./frontend

      - name: Export images
        run: |
          docker save teacher-archive-backend:${{ steps.tag.outputs.value }} | gzip > backend.tar.gz
          docker save teacher-archive-frontend:${{ steps.tag.outputs.value }} | gzip > frontend.tar.gz

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/nginx/"
          target: "/opt/teacher-archive-system"
          strip_components: 1

      - name: Copy images to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "backend.tar.gz,frontend.tar.gz"
          target: "/tmp"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker load < /tmp/backend.tar.gz
            docker load < /tmp/frontend.tar.gz
            rm -f /tmp/backend.tar.gz /tmp/frontend.tar.gz
            cd /opt/teacher-archive-system
            export IMAGE_TAG=${{ steps.tag.outputs.value }}
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            docker compose up -d --remove-orphans
            docker image prune -f
