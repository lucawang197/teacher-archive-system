version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: teacher-archive-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: teacher_archive_system
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: crpi-lrtzv0wzn4tivn50.cn-shanghai.personal.cr.aliyuncs.com/teacher-archive/teacher-archive-system-backend:${IMAGE_TAG:-latest}
    container_name: teacher-archive-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/teacher_archive_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/backups:/data/backups
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '8080:8080'

  frontend:
    image: crpi-lrtzv0wzn4tivn50.cn-shanghai.personal.cr.aliyuncs.com/teacher-archive/teacher-archive-system-frontend:${IMAGE_TAG:-latest}
    container_name: teacher-archive-frontend
    restart: unless-stopped
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    ports:
      - '80:80'
      - '443:443'
