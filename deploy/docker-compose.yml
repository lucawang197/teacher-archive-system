version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: teacher-archive-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: teacher_archive_system
      MYSQL_USER: tas_user
      MYSQL_PASSWORD: tas_password
    ports:
      - '3306:3306'
    volumes:
      - ./data/mysql:/var/lib/mysql

  backend:
    image: eclipse-temurin:21-jre
    container_name: teacher-archive-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../backend/target:/app
      - ./data/uploads:/data/uploads
      - ./data/backups:/data/backups
    command: ['java', '-jar', '/app/teacher-archive-system-1.0.0.jar', '--spring.profiles.active=prod']
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - mysql
    ports:
      - '8080:8080'

  frontend:
    image: nginx:1.27
    container_name: teacher-archive-frontend
    restart: unless-stopped
    volumes:
      - ../frontend/dist:/usr/share/nginx/html
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    ports:
      - '80:80'
