server {
    listen 80;
    server_name sunlit.asia www.sunlit.asia;
    return 301 https://sunlit.asia$request_uri;
}

server {
    listen 443 ssl;
    server_name www.sunlit.asia;
    ssl_certificate     /etc/letsencrypt/live/sunlit.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sunlit.asia/privkey.pem;
    return 301 https://sunlit.asia$request_uri;
}

server {
    listen 443 ssl;
    server_name sunlit.asia;

    ssl_certificate     /etc/letsencrypt/live/sunlit.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sunlit.asia/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100m;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
